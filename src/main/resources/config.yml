# ============================================
#  ImpostorGame Configuration
# ============================================

rtp:
  # Radius (in blocks) around each player's current position used
  # for the random teleport when /impstart is used.
  range: 300

game:
  # Whether to clear player inventories when a new round starts
  clear-inventory: true

respawn:
  # How many times the impostor is allowed to respawn before being
  # banned like everyone else.
  impostor-respawns: 1

messages:
  impostor-role: "&c&lYOU ARE THE IMPOSTOR"
  impostor-subtitle: "&7Kill everyone without getting caught!"
  crewmate-role: "&a&lYOU ARE A CREWMATE"
  crewmate-subtitle: "&7Find the impostor before it's too late!"
  # Message sent ONLY to the impostor whenever they get a kill
  impostor-kill: "&cYou killed someone!"

ban:
  # Message shown to a player when they are banned/kicked
  message: "&cYou were eliminated from the Impostor Game."

rules:
  # Disables all normal chat messages (a voice chat plugin is expected instead)
  block-chat: true
  # Disables /msg, /tell, /w and similar private message commands
  block-msg-commands: true
  blocked-commands:
    - msg
    - tell
    - w
    - whisper
    - r
    - reply
    - t
    - emsg
    - em
    - message
    - mail
